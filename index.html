<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>宠物托运管理系统 - 订单追踪与笼位管理</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app">
        <header class="app-header">
            <div class="header-inner">
                <div class="brand">
                    <div class="logo">
                        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5.17C12 5.17 8.5 2 4.5 4.5C2 7 2.5 11 6 13.5C8.5 15.5 11 14.5 12 13C13 14.5 15.5 15.5 18 13.5C21.5 11 22 7 19.5 4.5C15.5 2 12 5.17 12 5.17Z"/>
                            <circle cx="7.5" cy="9.5" r="1"/>
                            <circle cx="16.5" cy="9.5" r="1"/>
                            <path d="M12 13.5L11 16H13L12 13.5Z"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <h1>安心宠物托运</h1>
                        <p>订单追踪与笼位管理系统</p>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="date-filter">
                        <label for="filterDate">筛选日期：</label>
                        <input type="date" id="filterDate">
                        <button class="btn btn-ghost btn-sm" id="clearFilterBtn">清除</button>
                    </div>
                    <div class="operator-info">
                        <span>操作人：</span>
                        <input type="text" id="operatorName" value="张管理员" maxlength="20">
                    </div>
                </div>
            </div>
        </header>

        <main class="app-main">
            <section class="stats-bar" id="statsBar">
            </section>

            <div class="main-content">
                <div class="left-panel">
                    <section class="card order-form-card">
                        <h2 class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
                            创建新订单
                        </h2>
                        <form id="orderForm" class="order-form">
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="petBreed">宠物品种 <span class="required">*</span></label>
                                    <input type="text" id="petBreed" placeholder="如：金毛、布偶猫" required>
                                </div>
                                <div class="form-group">
                                    <label for="petWeight">体重(kg) <span class="required">*</span></label>
                                    <input type="number" id="petWeight" step="0.1" min="0.1" placeholder="如：5.5" required>
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="checkbox-label">
                                    <input type="checkbox" id="vaccinated">
                                    <span>已接种疫苗</span>
                                </label>
                            </div>
                            <div class="form-row">
                                <div class="form-group">
                                    <label for="origin">起运地 <span class="required">*</span></label>
                                    <select id="origin" required>
                                        <option value="">请选择起运城市</option>
                                        <option value="北京" data-lat="39.9042" data-lng="116.4074">北京</option>
                                        <option value="上海" data-lat="31.2304" data-lng="121.4737">上海</option>
                                        <option value="广州" data-lat="23.1291" data-lng="113.2644">广州</option>
                                        <option value="深圳" data-lat="22.5431" data-lng="114.0579">深圳</option>
                                        <option value="成都" data-lat="30.5728" data-lng="104.0668">成都</option>
                                        <option value="杭州" data-lat="30.2741" data-lng="120.1551">杭州</option>
                                        <option value="武汉" data-lat="30.5928" data-lng="114.3055">武汉</option>
                                        <option value="西安" data-lat="34.3416" data-lng="108.9398">西安</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="destination">目的地 <span class="required">*</span></label>
                                    <select id="destination" required>
                                        <option value="">请选择目的城市</option>
                                        <option value="北京" data-lat="39.9042" data-lng="116.4074">北京</option>
                                        <option value="上海" data-lat="31.2304" data-lng="121.4737">上海</option>
                                        <option value="广州" data-lat="23.1291" data-lng="113.2644">广州</option>
                                        <option value="深圳" data-lat="22.5431" data-lng="114.0579">深圳</option>
                                        <option value="成都" data-lat="30.5728" data-lng="104.0668">成都</option>
                                        <option value="杭州" data-lat="30.2741" data-lng="120.1551">杭州</option>
                                        <option value="武汉" data-lat="30.5928" data-lng="114.3055">武汉</option>
                                        <option value="西安" data-lat="34.3416" data-lng="108.9398">西安</option>
                                    </select>
                                </div>
                            </div>
                            <div class="form-group">
                                <label for="shipDate">托运日期 <span class="required">*</span></label>
                                <input type="date" id="shipDate" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-full">
                                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                                创建订单并分配笼位
                            </button>
                        </form>
                    </section>

                    <section class="card">
                        <h2 class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            订单列表
                        </h2>
                        <div class="order-tabs" id="orderTabs">
                            <button class="tab-btn active" data-status="all">全部</button>
                            <button class="tab-btn" data-status="pending">待接单</button>
                            <button class="tab-btn" data-status="waiting_pickup">待取宠</button>
                            <button class="tab-btn" data-status="in_transit">运输中</button>
                            <button class="tab-btn" data-status="arrived">已到达</button>
                            <button class="tab-btn" data-status="delivered">已签收</button>
                        </div>
                        <div class="order-list" id="orderList">
                        </div>
                    </section>
                </div>

                <div class="right-panel">
                    <section class="card">
                        <h2 class="card-title">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                            笼位管理（共20笼位）
                        </h2>
                        <div class="cage-legend">
                            <span class="legend-item"><span class="legend-dot available"></span>空闲</span>
                            <span class="legend-item"><span class="legend-dot occupied"></span>占用</span>
                            <span class="legend-item"><span class="legend-dot cleaning"></span>消毒中</span>
                        </div>
                        <div class="cage-grid" id="cageGrid">
                        </div>
                    </section>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modalOverlay" style="display: none;">
        <div class="modal" id="orderDetailModal">
            <div class="modal-header">
                <h3 id="modalTitle">订单详情</h3>
                <button class="modal-close" id="modalCloseBtn">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/store.js"></script>
    <script src="js/cageManager.js"></script>
    <script src="js/orderManager.js"></script>
    <script src="js/mapView.js"></script>
    <script src="js/pdfGenerator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
